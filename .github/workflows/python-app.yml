name: Run Python script capo

on:
  workflow_dispatch:
  push:
    branches:
      - master
  schedule:
    - cron: '*/20 * * * *'

permissions:
  contents: write

concurrency:
  group: check-forito
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script
      run: python -u main.py
      env:
        API_TOKEN: ${{ secrets.API_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        PYTHONUNBUFFERED: "1"

    - name: Commit changes
      run: |
        git config --global user.name 'fdbustamante'
        git config --global user.email 'federicobustamante@gmail.com'
        if [ -n "$(git status --porcelain state.json)" ]; then
          git add state.json
          git commit -m "Update state.json with new value"
          git push
        else
          echo "No changes to commit"
        fi
